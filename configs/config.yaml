models:
  detector:
    weights: artifacts/best.pt
    confidence_threshold: 0.5
    iou_threshold: 0.45
    image_size: 480
  pose:
    weights: artifacts/yolov8n-pose.pt
    confidence_threshold: 0.5
  ocr:
    lang: en
    use_angle_cls: true

detection:
  reporting_confidence: 0.7
  triple_riding_threshold: 3
  vehicle_pad_ratio: 0.3

plate:
  ka_pattern: "^KA\\s?\\d{2}\\s?[A-Z]{1,3}\\s?\\d{1,4}$"
  min_crop_width: 100
  upscale_factor: 3

llm_violations:
  enabled: true
  provider: groq
  model: meta-llama/llama-4-scout-17b-16e-instruct
  api_key_env: GROQ_API_KEY
  timeout_seconds: 30
  classifications:
    mobile_phone: { enabled: true, confidence_threshold: 0.7 }
    wrong_side_driving: { enabled: true, confidence_threshold: 0.6 }
    red_light: { enabled: true, confidence_threshold: 0.7 }
    seatbelt: { enabled: true, confidence_threshold: 0.6 }
    stop_line: { enabled: true, confidence_threshold: 0.6 }
    illegal_parking: { enabled: true, confidence_threshold: 0.6 }